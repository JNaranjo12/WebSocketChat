<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPN FIS Chat WebSocket</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-shell">
        <section id="loginScreen" class="login-screen">
            <form id="loginForm" class="login-panel" autocomplete="off">
                <label for="usernameInput" class="visually-hidden">Usuario</label>
                <input
                    type="text"
                    id="usernameInput"
                    class="form-control form-control-lg"
                    placeholder="Usuario"
                    maxlength="20"
                    required
                >
                <button type="submit" class="btn btn-success btn-lg">Entrar</button>
            </form>
        </section>

        <section id="chatScreen" class="chat-screen d-none">
            <div class="chat-layout container-fluid">
                <header class="chat-header">
                    <div>
                        <p class="chat-kicker mb-1">Chat WebSocket</p>
                        <h1 class="chat-title mb-0" id="activeUser"></h1>
                    </div>

                    <div class="d-flex align-items-center gap-3">
                        <div class="connection-dot" id="connectionDot" aria-hidden="true"></div>
                        <div class="form-check form-switch theme-switch mb-0">
                            <input class="form-check-input" type="checkbox" role="switch" id="themeToggle">
                            <label class="form-check-label" for="themeToggle">Oscuro</label>
                        </div>
                    </div>
                </header>

                <div id="messages" class="messages" aria-live="polite"></div>

                <form id="messageForm" class="message-form">
                    <label for="messageInput" class="visually-hidden">Mensaje</label>
                    <input
                        type="text"
                        id="messageInput"
                        class="form-control"
                        placeholder="Escribe tu mensaje..."
                        maxlength="500"
                        autocomplete="off"
                    >
                    <button id="sendBtn" type="submit" class="btn btn-success">Enviar</button>
                </form>

                <p id="status" class="status-text mb-0"></p>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
